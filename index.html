<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SP Neighborhood Map — Nubank Relocation Guide</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- PapaParse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- chroma.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">
    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
      <div id="legend">
        <div class="legend-title">Composite Score</div>
        <div id="legend-gradient"></div>
        <div class="legend-labels">
          <span>Low</span>
          <span>High</span>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <div class="logo">
          <span class="logo-mark">●</span>
          <span class="logo-text">SP District Map</span>
        </div>
        <p class="subtitle">Nubank Relocation Guide</p>
        <button id="sidebar-toggle" aria-label="Toggle sidebar">▼</button>
      </div>

      <div id="sidebar-body">

        <section class="sidebar-section">
          <h3>Weight Sliders</h3>
          <p class="section-hint">Drag to prioritize what matters most. Map updates instantly.</p>

          <div id="sliders-container">
            <!-- Sliders injected by JS -->
          </div>

          <button id="reset-weights" class="btn btn-secondary">Reset Weights</button>

          <div class="opacity-row">
            <span class="slider-label">Map Opacity</span>
            <span class="slider-value" id="opacity-value">82%</span>
            <input type="range" id="opacity-slider" min="10" max="100" step="1" value="82" />
          </div>
        </section>

        <section class="sidebar-section">
          <h3>CSV Data</h3>
          <p class="section-hint">Edit <code>data/neighborhoods.csv</code> then reload it here, or download the current dataset.</p>

          <div class="csv-buttons">
            <label class="btn btn-secondary" for="csv-input">
              Load CSV
              <input type="file" id="csv-input" accept=".csv" hidden />
            </label>
            <button id="download-csv" class="btn btn-secondary">Download CSV</button>
          </div>

          <div id="csv-status"></div>
        </section>

        <section class="sidebar-section" id="district-detail" style="display:none">
          <h3>District Detail</h3>
          <div id="detail-content"></div>
        </section>

      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
